; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino

monitor_speed = 115200

board_upload.flash_size = 16MB
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
board_build.arduino.memory_type = qio_opi

build_flags =
    -DBOARD_HAS_PSRAM

lib_deps =
    https://github.com/avishorp/TM1637.git
    madhephaestus/ESP32Encoder
    adafruit/Adafruit GFX Library
    adafruit/Adafruit ST7735 and ST7789 Library

; Standalone diagnostic: cycles 1/11/111/1111 on all four TM1637
; displays. Does not build or touch src/main.cpp.
; Run with: pio run -e display-test -t upload
[env:display-test]
extends = env:esp32-s3-devkitc-1
build_src_filter = -<*> +<../examples/display_flash_test.cpp>

; Full I/O diagnostic: exercises every wired input and output
; (4 player buttons + Action switch/light, 4 displays, TFT, encoder).
; No buzzer yet. Does not build or touch src/main.cpp.
; Run with: pio run -e full-io-test -t upload
[env:full-io-test]
extends = env:esp32-s3-devkitc-1
build_src_filter = -<*> +<../examples/full_io_test.cpp>

; The real firmware: builds every module under src/ (App + all
; managers) plus the tiny entry point in examples/app_main.cpp,
; excluding only src/main.cpp (the hardware bring-up demo). Does not
; touch or replace main.cpp/the default env.
; Run with: pio run -e app -t upload
[env:app]
extends = env:esp32-s3-devkitc-1
build_src_filter = +<*> -<main.cpp> +<../examples/app_main.cpp>

; Native (host machine, no ESP32/hardware needed) unit tests for the
; pure-logic modules that have zero Arduino/hardware dependency:
; PlayerManager, ButtonAssignmentManager, DisplayAssignmentManager.
; TimerManager is NOT included here -- it calls millis() directly, and
; injecting a mockable clock into production code wasn't asked for.
; Run with: pio test -e native
[env:native]
platform = native
test_build_src = yes
build_src_filter = -<*> +<game/PlayerManager.cpp> +<game/ButtonAssignmentManager.cpp> +<game/DisplayAssignmentManager.cpp>